name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, build & smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Auth client-safety guard
        run: bun run check:auth-client-safe

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
        env:
          # Public envs needed at build time. CI uses harmless placeholders;
          # real values come from the deploy environment, not the repo.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
          VITE_SUPABASE_PROJECT_ID: placeholder

      - name: Smoke test (boot server, hit /)
        run: |
          bun run preview --port 4173 &
          SERVER_PID=$!
          # Wait up to 60s for the server to respond
          for i in $(seq 1 30); do
            if curl -sfI http://127.0.0.1:4173/ > /dev/null; then
              echo "Server is up"
              break
            fi
            sleep 2
          done
          # Final check — fail the job if the homepage isn't reachable
          curl -sfI http://127.0.0.1:4173/ > /dev/null \
            || { echo "Smoke test failed: server did not respond"; kill $SERVER_PID || true; exit 1; }
          # /api/ocr-script should reject GET (proves the route is mounted)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4173/api/ocr-script)
          echo "GET /api/ocr-script -> $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Unexpected 200 from GET on POST-only route"
            kill $SERVER_PID || true
            exit 1
          fi
          kill $SERVER_PID || true
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
          VITE_SUPABASE_PROJECT_ID: placeholder
